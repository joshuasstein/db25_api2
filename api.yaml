openapi: 3.0.0
info:
  title: db25_api2
  version: 0.0.4

components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      x-bearerInfoFunc: app3.bearer_auth

paths:
  /login:
    post:
      summary: User login
      operationId: app3.login
      security: []  # Override global security - no auth required for login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required:
                - username
                - password
      responses:
        '200':
          description: JWT access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /v1/systems:
